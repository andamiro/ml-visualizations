<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>м•„н•Җ н•ЁмҲҳк°Җ нҚјм…үнҠёлЎ м—җ лҜём№ҳлҠ” мҳҒн–Ҙ</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f8f7f4;
    color: #2c2c2a;
    padding: 1.5rem;
  }
  h1 { font-size: 17px; font-weight: 500; margin-bottom: 1.25rem; }

  .layout { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

  .panel {
    background: #fff;
    border: 0.5px solid rgba(0,0,0,0.1);
    border-radius: 12px;
    padding: 14px;
  }
  .panel-title { font-size: 13px; color: #5f5e5a; margin-bottom: 10px; }

  .controls { margin-bottom: 1.25rem; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .ctrl-card { background: #eeece6; border-radius: 8px; padding: 12px 14px; }
  .ctrl-label {
    font-size: 12px; color: #5f5e5a;
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 6px;
  }
  .ctrl-label .name { font-weight: 500; font-size: 13px; color: #2c2c2a; }
  .ctrl-label .val { font-size: 13px; font-weight: 500; color: #185FA5; font-variant-numeric: tabular-nums; }
  .ctrl-desc { font-size: 11px; color: #888780; margin-top: 6px; line-height: 1.4; }
  input[type=range] { width: 100%; accent-color: #185FA5; }

  .insight {
    margin-top: 1rem;
    background: #eeece6;
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 13px; color: #5f5e5a; line-height: 1.6;
    min-height: 48px;
  }
  .insight strong { color: #2c2c2a; font-weight: 500; }

  canvas { display: block; width: 100% !important; }

  @media (max-width: 560px) {
    .layout { grid-template-columns: 1fr; }
    .controls { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<h1>м•„н•Җ н•ЁмҲҳк°Җ нҚјм…үнҠёлЎ м—җ лҜём№ҳлҠ” мҳҒн–Ҙ</h1>

<div class="controls">
  <div class="ctrl-card">
    <div class="ctrl-label">
      <span class="name">к°ҖмӨ‘м№ҳ w</span>
      <span class="val" id="w-val">1.0</span>
    </div>
    <input type="range" min="-4" max="4" step="0.1" value="1" id="w-slider">
    <div class="ctrl-desc">мһ…л Ҙ ліҖнҷ”м—җ м–јл§ҲлӮҳ лҜјк°җн•ҳкІҢ л°ҳмқ‘н• м§Җ кІ°м •</div>
  </div>
  <div class="ctrl-card">
    <div class="ctrl-label">
      <span class="name">м ҲнҺё b</span>
      <span class="val" id="b-val">0.0</span>
    </div>
    <input type="range" min="-4" max="4" step="0.1" value="0" id="b-slider">
    <div class="ctrl-desc">кІ°м • кІҪкі„(z = 0)мқҳ мң„м№ҳлҘј мқҙлҸҷ</div>
  </div>
</div>

<div class="layout">
  <div class="panel">
    <div class="panel-title">z = wВ·x + b &nbsp;(м•„н•Җ н•ЁмҲҳ)</div>
    <canvas id="affine-canvas"></canvas>
  </div>
  <div class="panel">
    <div class="panel-title">Е· = sign(wВ·x + b) &nbsp;вҖ” м¶ңл Ҙ: {вҲ’1, +1}</div>
    <canvas id="step-canvas"></canvas>
  </div>
</div>

<div class="insight" id="insight"></div>

<script>
let w = 1.0, b = 0.0;
let mode = 'pm';

const X_MIN = -6, X_MAX = 6;
const Z_MIN = -8, Z_MAX = 8;

const BLUE   = '#185FA5';
const GREEN  = '#1a7a4a';
const RED_C  = '#A32D2D';
const AMBER  = 'rgba(180,100,0,0.85)';
const GRID   = 'rgba(0,0,0,0.06)';
const AXIS   = 'rgba(0,0,0,0.12)';
const TEXT   = '#888780';

function step(z) {
  if (mode === '01') return z >= 0 ? 1 : 0;
  else return z >= 0 ? 1 : -1;
}

function getYRange() {
  return mode === '01' ? { lo: -0.3, hi: 1.3 } : { lo: -1.5, hi: 1.5 };
}

function setupCanvas(canvas) {
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.parentElement.clientWidth - 28;
  const H = Math.round(W * 0.75);
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  return { ctx, W, H };
}

function drawGrid(ctx, W, H, pad, toX, toY, xTicks, yTicks) {
  ctx.strokeStyle = GRID; ctx.lineWidth = 0.5;
  xTicks.forEach(x => {
    const px = toX(x);
    ctx.beginPath(); ctx.moveTo(px, pad); ctx.lineTo(px, H - pad); ctx.stroke();
  });
  yTicks.forEach(y => {
    const py = toY(y);
    ctx.beginPath(); ctx.moveTo(pad, py); ctx.lineTo(W - pad, py); ctx.stroke();
  });
  ctx.strokeStyle = AXIS; ctx.lineWidth = 1;
  const ax = toX(0);
  if (ax > pad && ax < W - pad) {
    ctx.beginPath(); ctx.moveTo(ax, pad); ctx.lineTo(ax, H - pad); ctx.stroke();
  }
  const ay = toY(0);
  if (ay > pad && ay < H - pad) {
    ctx.beginPath(); ctx.moveTo(pad, ay); ctx.lineTo(W - pad, ay); ctx.stroke();
  }
}

function drawAffine(canvas) {
  const { ctx, W, H } = setupCanvas(canvas);
  const pad = 36;
  const toX = v => pad + (v - X_MIN) / (X_MAX - X_MIN) * (W - 2 * pad);
  const toY = v => pad + (1 - (v - Z_MIN) / (Z_MAX - Z_MIN)) * (H - 2 * pad);

  ctx.clearRect(0, 0, W, H);
  drawGrid(ctx, W, H, pad, toX, toY, [-4,-2,0,2,4], [-6,-3,0,3,6]);

  // ghost line (w=1, b=0)
  ctx.beginPath();
  ctx.moveTo(toX(X_MIN), toY(Math.max(Z_MIN, Math.min(Z_MAX, X_MIN))));
  ctx.lineTo(toX(X_MAX), toY(Math.max(Z_MIN, Math.min(Z_MAX, X_MAX))));
  ctx.strokeStyle = 'rgba(0,0,0,0.1)'; ctx.lineWidth = 1;
  ctx.setLineDash([3,3]); ctx.stroke(); ctx.setLineDash([]);

  // z=0 threshold line
  ctx.setLineDash([4,3]);
  ctx.strokeStyle = AMBER; ctx.lineWidth = 1.2;
  ctx.beginPath(); ctx.moveTo(pad, toY(0)); ctx.lineTo(W-pad, toY(0)); ctx.stroke();
  ctx.setLineDash([]);

  // actual line вҖ” x-clamped so endpoints stay within z range
  let lx1 = X_MIN, lx2 = X_MAX;
  if (w !== 0) {
    const xAtZMin = (Z_MIN - b) / w;
    const xAtZMax = (Z_MAX - b) / w;
    const xLo = Math.min(xAtZMin, xAtZMax);
    const xHi = Math.max(xAtZMin, xAtZMax);
    lx1 = Math.max(X_MIN, xLo);
    lx2 = Math.min(X_MAX, xHi);
  }
  ctx.beginPath();
  ctx.moveTo(toX(lx1), toY(w * lx1 + b));
  ctx.lineTo(toX(lx2), toY(w * lx2 + b));
  ctx.strokeStyle = BLUE; ctx.lineWidth = 2.5;
  ctx.stroke();

  // z=0 crossing dot
  if (w !== 0) {
    const xBound = -b / w;
    if (xBound >= X_MIN && xBound <= X_MAX) {
      ctx.beginPath(); ctx.arc(toX(xBound), toY(0), 5, 0, Math.PI * 2);
      ctx.fillStyle = AMBER; ctx.fill();
      ctx.fillStyle = AMBER; ctx.font = '11px sans-serif'; ctx.textAlign = 'left';
      ctx.fillText(`x = ${xBound.toFixed(1)} м—җм„ң z=0`, toX(xBound) + 8, toY(0) - 6);
    }
  }

  // annotations
  ctx.fillStyle = BLUE; ctx.font = '11px sans-serif'; ctx.textAlign = 'left';
  ctx.fillText(`кё°мҡёкё° = w = ${w.toFixed(1)}`, pad + 4, pad + 14);
  ctx.fillStyle = TEXT;
  ctx.fillText(`yм ҲнҺё = b = ${b.toFixed(1)}`, pad + 4, pad + 28);

  // axis labels
  ctx.fillStyle = TEXT; ctx.font = '11px sans-serif'; ctx.textAlign = 'center';
  [-4,-2,0,2,4].forEach(x => ctx.fillText(x, toX(x), H - pad + 14));
  ctx.textAlign = 'right';
  [-6,-3,0,3,6].forEach(y => ctx.fillText(y, pad - 4, toY(y) + 4));
  ctx.textAlign = 'center';
  ctx.fillText('мһ…л Ҙ x', (pad + W - pad) / 2, H - 2);
  ctx.save(); ctx.translate(11, (pad + H - pad) / 2); ctx.rotate(-Math.PI / 2);
  ctx.fillText('z к°’', 0, 0); ctx.restore();
}

function drawStep(canvas) {
  const { ctx, W, H } = setupCanvas(canvas);
  const pad = 36;
  const { lo, hi } = getYRange();
  const toX = v => pad + (v - X_MIN) / (X_MAX - X_MIN) * (W - 2 * pad);
  const toY = v => pad + (1 - (v - lo) / (hi - lo)) * (H - 2 * pad);

  ctx.clearRect(0, 0, W, H);

  // y grid lines
  const yTicks = mode === '01' ? [0, 1] : [-1, 0, 1];
  drawGrid(ctx, W, H, pad, toX, toY, [-4,-2,0,2,4], yTicks);

  // decision boundary vertical line
  const xBound = w !== 0 ? -b / w : null;

  // step function line segments
  const loVal = mode === '01' ? 0 : -1;
  const hiVal = 1;

  // shade regions вҖ” мӢӨм ң м¶ңл Ҙк°’ кё°мӨҖмңјлЎң мғү кІ°м •
  if (xBound !== null && xBound > X_MIN && xBound < X_MAX) {
    const leftOut  = w > 0 ? loVal : hiVal;
    const leftShade  = leftOut === hiVal ? 'rgba(26,122,74,0.07)' : 'rgba(163,45,45,0.06)';
    const rightShade = leftOut === hiVal ? 'rgba(163,45,45,0.06)' : 'rgba(26,122,74,0.07)';
    ctx.fillStyle = leftShade;
    ctx.fillRect(pad, pad, toX(xBound) - pad, H - 2*pad);
    ctx.fillStyle = rightShade;
    ctx.fillRect(toX(xBound), pad, (W - pad) - toX(xBound), H - 2*pad);
  }

  // left segment (z < 0 вҶ’ loVal)
  const leftEnd = xBound !== null ? Math.min(xBound, X_MAX) : X_MAX;
  if (leftEnd > X_MIN && w !== 0) {
    // only draw if boundary exists and w != 0
  }

  // full step drawing
  if (w === 0) {
    // flat line: z = b everywhere, single output
    const out = b >= 0 ? hiVal : loVal;
    ctx.beginPath();
    ctx.moveTo(toX(X_MIN), toY(out));
    ctx.lineTo(toX(X_MAX), toY(out));
    ctx.strokeStyle = BLUE; ctx.lineWidth = 2.5; ctx.stroke();
  } else {
    const xB = -b / w;
    // left of boundary: z < 0 if w>0, z > 0 if w<0
    const leftOut  = w > 0 ? loVal : hiVal;
    const rightOut = w > 0 ? hiVal : loVal;

    // left segment
    if (xB > X_MIN) {
      ctx.beginPath();
      ctx.moveTo(toX(X_MIN), toY(leftOut));
      ctx.lineTo(toX(Math.min(xB, X_MAX)), toY(leftOut));
      ctx.strokeStyle = w > 0 ? RED_C : GREEN; ctx.lineWidth = 2.5; ctx.stroke();
    }

    // right segment
    if (xB < X_MAX) {
      ctx.beginPath();
      ctx.moveTo(toX(Math.max(xB, X_MIN)), toY(rightOut));
      ctx.lineTo(toX(X_MAX), toY(rightOut));
      ctx.strokeStyle = w > 0 ? GREEN : RED_C; ctx.lineWidth = 2.5; ctx.stroke();
    }

    // vertical jump line (dashed)
    if (xB >= X_MIN && xB <= X_MAX) {
      ctx.setLineDash([3,3]);
      ctx.strokeStyle = 'rgba(0,0,0,0.2)'; ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(toX(xB), toY(leftOut));
      ctx.lineTo(toX(xB), toY(rightOut));
      ctx.stroke();
      ctx.setLineDash([]);

      // open circle (excluded point on left)
      ctx.beginPath();
      ctx.arc(toX(xB), toY(leftOut), 4, 0, Math.PI * 2);
      ctx.strokeStyle = w > 0 ? RED_C : GREEN;
      ctx.lineWidth = 1.5; ctx.fillStyle = '#f8f7f4';
      ctx.fill(); ctx.stroke();

      // filled circle (included point z=0 вҶ’ hiVal if {0,1}, +1 if {-1,+1})
      const atBoundOut = hiVal; // step(0) = 1 in both conventions
      ctx.beginPath();
      ctx.arc(toX(xB), toY(atBoundOut), 4, 0, Math.PI * 2);
      ctx.fillStyle = GREEN; ctx.fill();

      // boundary label
      ctx.fillStyle = AMBER; ctx.font = '11px sans-serif'; ctx.textAlign = 'left';
      ctx.fillText(`кІ°м • кІҪкі„ x = ${xB.toFixed(1)}`, toX(xB) + 8, toY(0.5 * (leftOut + rightOut)) - 6);
    }
  }

  // output label annotations
  const rightColor = w >= 0 ? GREEN : RED_C;
  const leftColor  = w >= 0 ? RED_C : GREEN;
  const rightLabel = w >= 0 ? (mode === '01' ? 'Е· = 1 (м–‘м„ұ)' : 'Е· = +1 (м–‘м„ұ)') : (mode === '01' ? 'Е· = 0 (мқҢм„ұ)' : 'Е· = вҲ’1 (мқҢм„ұ)');
  const leftLabel  = w >= 0 ? (mode === '01' ? 'Е· = 0 (мқҢм„ұ)' : 'Е· = вҲ’1 (мқҢм„ұ)') : (mode === '01' ? 'Е· = 1 (м–‘м„ұ)' : 'Е· = +1 (м–‘м„ұ)');

  ctx.font = '11px sans-serif';
  // right region label
  ctx.fillStyle = rightColor; ctx.textAlign = 'right';
  ctx.fillText(rightLabel, W - pad - 4, pad + 14);
  // left region label
  ctx.fillStyle = leftColor; ctx.textAlign = 'left';
  ctx.fillText(leftLabel, pad + 4, pad + 14);

  // axis labels
  ctx.fillStyle = TEXT; ctx.font = '11px sans-serif'; ctx.textAlign = 'center';
  [-4,-2,0,2,4].forEach(x => ctx.fillText(x, toX(x), H - pad + 14));
  ctx.textAlign = 'right';
  yTicks.forEach(y => ctx.fillText(y, pad - 4, toY(y) + 4));
  ctx.textAlign = 'center';
  ctx.fillText('мһ…л Ҙ x', (pad + W - pad) / 2, H - 2);
  ctx.save(); ctx.translate(11, (pad + H - pad) / 2); ctx.rotate(-Math.PI / 2);
  ctx.fillText('м¶ңл Ҙ Е·', 0, 0); ctx.restore();
}

function getInsight(w, b) {
  if (w === 0) {
    const out = b >= 0 ? '+1' : 'вҲ’1';
    return `<strong>w = 0</strong> вҖ” z = b = ${b.toFixed(1)} мңјлЎң кі м •. xм—җ мғҒкҙҖм—Ҷмқҙ Е· = ${out} л§Ң м¶ңл ҘлҗЁ. мһ…л Ҙмқ„ м „нҳҖ мӮ¬мҡ©н•ҳм§Җ м•ҠлҠ” мғҒнғң.`;
  }

  const xBound = (-b / w).toFixed(2);
  let msg = '';

  if (w > 0) {
    msg = `<strong>w > 0</strong> вҶ’ xк°Җ нҒҙмҲҳлЎқ zк°Җ м»Өм§җ. x < ${xBound} мқҙл©ҙ Е· = вҲ’1, x вүҘ ${xBound} мқҙл©ҙ Е· = +1.`;
  } else {
    msg = `<strong>w < 0</strong> вҶ’ xк°Җ нҒҙмҲҳлЎқ zк°Җ мһ‘м•„м§җ. x < ${xBound} мқҙл©ҙ Е· = +1, x вүҘ ${xBound} мқҙл©ҙ Е· = вҲ’1. л°©н–Ҙмқҙ л°ҳм „лҗЁ.`;
  }

  // кІ°м • кІҪкі„ мқҙлҸҷ л°©н–Ҙ: x* = -b/w мқҙлҜҖлЎң b мҰқк°Җ мӢң мқҙлҸҷ л°©н–ҘмқҖ w л¶Җнҳём—җ л”°лқј кІ°м •
  let bMsg = '';
  if (b === 0) {
    bMsg = ` <strong>b = 0</strong>мқҙлҜҖлЎң кІ°м • кІҪкі„к°Җ x = 0.`;
  } else {
    const dir = (w > 0 && b > 0) || (w < 0 && b < 0) ? 'мҷјмӘҪ' : 'мҳӨлҘёмӘҪ';
    bMsg = ` <strong>b = ${b.toFixed(1)}</strong>мңјлЎң мқён•ҙ кІ°м • кІҪкі„к°Җ x = ${xBound}мңјлЎң ${dir} мқҙлҸҷ.`;
  }

  return msg + bMsg;
}

function update() {
  drawAffine(document.getElementById('affine-canvas'));
  drawStep(document.getElementById('step-canvas'));
  document.getElementById('insight').innerHTML = getInsight(w, b);
}

document.getElementById('w-slider').addEventListener('input', e => {
  w = parseFloat(e.target.value);
  document.getElementById('w-val').textContent = w.toFixed(1);
  update();
});
document.getElementById('b-slider').addEventListener('input', e => {
  b = parseFloat(e.target.value);
  document.getElementById('b-val').textContent = b.toFixed(1);
  update();
});

update();
window.addEventListener('resize', update);
</script>
</body>
</html>
