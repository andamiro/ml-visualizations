<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로지스틱 회귀 시각화</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f8f7f4;
    color: #2c2c2a;
    min-height: 100vh;
    padding: 1.5rem;
  }
  h1 { font-size: 18px; font-weight: 500; margin-bottom: 1.25rem; color: #2c2c2a; }
  .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1.25rem; }
  .ctrl-card { background: #eeece6; border-radius: 8px; padding: 12px 14px; }
  .ctrl-label { font-size: 12px; color: #5f5e5a; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
  .ctrl-label span { font-weight: 500; color: #2c2c2a; font-size: 13px; }
  input[type=range] { width: 100%; accent-color: #185FA5; }
  .preset-row { display: flex; gap: 8px; margin-bottom: 1.25rem; flex-wrap: wrap; }
  .preset-btn {
    padding: 6px 14px; border-radius: 8px;
    border: 0.5px solid #b4b2a9;
    background: #fff; color: #5f5e5a;
    font-size: 13px; cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }
  .preset-btn:hover { background: #eeece6; color: #2c2c2a; }
  .preset-btn.active { background: #185FA5; border-color: #185FA5; color: #E6F1FB; }
  .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .chart-box {
    background: #fff;
    border: 0.5px solid rgba(0,0,0,0.1);
    border-radius: 12px; padding: 14px;
  }
  .chart-title { font-size: 13px; color: #5f5e5a; margin-bottom: 10px; }
  canvas { display: block; width: 100% !important; }
  .insight {
    margin-top: 1rem; background: #eeece6;
    border-radius: 8px; padding: 12px 14px;
    font-size: 13px; color: #5f5e5a; line-height: 1.6;
  }
  .insight strong { color: #2c2c2a; font-weight: 500; }
  @media (max-width: 560px) {
    .charts-row { grid-template-columns: 1fr; }
    .controls { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<h1>로지스틱 회귀 모델 시각화</h1>

<div class="preset-row" id="presets">
  <button class="preset-btn active" data-preset="well-separated">잘 분리된 데이터</button>
  <button class="preset-btn" data-preset="overlapping">중첩된 데이터</button>
  <button class="preset-btn" data-preset="imbalanced">불균형 데이터</button>
  <button class="preset-btn" data-preset="nonlinear">비선형 경계</button>
</div>

<div class="controls">
  <div class="ctrl-card">
    <div class="ctrl-label">클래스 간격 <span id="sep-val">3.0</span></div>
    <input type="range" min="0.5" max="5" step="0.1" value="3" id="sep-slider">
  </div>
  <div class="ctrl-card">
    <div class="ctrl-label">데이터 분산 <span id="noise-val">1.0</span></div>
    <input type="range" min="0.3" max="3" step="0.1" value="1" id="noise-slider">
  </div>
</div>

<div class="charts-row">
  <div class="chart-box">
    <div class="chart-title">데이터 분포 + 결정 경계</div>
    <canvas id="scatter"></canvas>
  </div>
  <div class="chart-box">
    <div class="chart-title">시그모이드 곡선 (확률 출력)</div>
    <canvas id="sigmoid"></canvas>
  </div>
</div>

<div class="insight" id="insight-text"></div>

<script>
const presets = {
  'well-separated': { sep: 3.0, noise: 0.8, label: '잘 분리된 데이터일수록 시그모이드 곡선이 가파르고(급격히 0→1), 결정 경계가 명확함.' },
  'overlapping':    { sep: 1.2, noise: 1.5, label: '클래스가 많이 겹칠수록 시그모이드 곡선이 완만해지고, 경계 근처에서 모델의 확신도가 낮아짐.' },
  'imbalanced':     { sep: 2.5, noise: 1.0, label: '한 클래스에 데이터가 몰리면 결정 경계가 소수 클래스 쪽으로 치우쳐 이동함.' },
  'nonlinear':      { sep: 2.0, noise: 0.7, label: '실제로 비선형 경계를 가진 데이터에 로지스틱 회귀를 쓰면 선형 경계로 근사하므로 오분류가 발생함.' }
};

let currentPreset = 'well-separated';
let sepVal = 3.0, noiseVal = 1.0;

function randn() {
  let u = 0, v = 0;
  while (!u) u = Math.random();
  while (!v) v = Math.random();
  return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
}
function sigmoid(z) { return 1 / (1 + Math.exp(-z)); }

function generateData(preset, sep, noise) {
  const pts = [];
  if (preset === 'imbalanced') {
    for (let i = 0; i < 80; i++) pts.push({ x: randn()*noise - sep/2, y: randn()*noise, cls: 0 });
    for (let i = 0; i < 20; i++) pts.push({ x: randn()*noise + sep/2, y: randn()*noise, cls: 1 });
  } else if (preset === 'nonlinear') {
    for (let i = 0; i < 50; i++) {
      const a = Math.random()*2*Math.PI, r = 1.2 + randn()*noise*0.4;
      pts.push({ x: r*Math.cos(a), y: r*Math.sin(a), cls: 0 });
    }
    for (let i = 0; i < 50; i++) {
      const a = Math.random()*2*Math.PI, r = 2.8 + randn()*noise*0.4;
      pts.push({ x: r*Math.cos(a), y: r*Math.sin(a), cls: 1 });
    }
  } else {
    for (let i = 0; i < 50; i++) pts.push({ x: randn()*noise - sep/2, y: randn()*noise, cls: 0 });
    for (let i = 0; i < 50; i++) pts.push({ x: randn()*noise + sep/2, y: randn()*noise, cls: 1 });
  }
  return pts;
}

function fitLogistic(pts) {
  let w = 0, b = 0;
  for (let iter = 0; iter < 200; iter++) {
    let dw = 0, db = 0;
    for (const p of pts) {
      const err = sigmoid(w*p.x + b) - p.cls;
      dw += err * p.x; db += err;
    }
    w -= 0.1 * dw / pts.length;
    b -= 0.1 * db / pts.length;
  }
  return { w, b };
}

function drawScatter(canvas, pts, model, preset) {
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.parentElement.clientWidth - 28;
  const H = Math.round(W * 0.85);
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const pad = 30;
  const allX = pts.map(p=>p.x), allY = pts.map(p=>p.y);
  const xMin = Math.min(...allX)-1, xMax = Math.max(...allX)+1;
  const yMin = Math.min(...allY)-1, yMax = Math.max(...allY)+1;
  const toX = x => pad + (x-xMin)/(xMax-xMin)*(W-2*pad);
  const toY = y => H - pad - (y-yMin)/(yMax-yMin)*(H-2*pad);

  ctx.strokeStyle = 'rgba(0,0,0,0.06)'; ctx.lineWidth = 0.5;
  for (let i=1;i<4;i++) {
    const gx = pad + i*(W-2*pad)/4;
    ctx.beginPath(); ctx.moveTo(gx,pad); ctx.lineTo(gx,H-pad); ctx.stroke();
    const gy = pad + i*(H-2*pad)/4;
    ctx.beginPath(); ctx.moveTo(pad,gy); ctx.lineTo(W-pad,gy); ctx.stroke();
  }

  if (preset !== 'nonlinear' && model) {
    const step = 4;
    for (let px = pad; px < W-pad; px += step) {
      const xv = xMin + (px-pad)/(W-2*pad)*(xMax-xMin);
      const prob = sigmoid(model.w*xv + model.b);
      const r = Math.round(180 + (246-180)*prob);
      const g = Math.round(210 + (140-210)*prob);
      const bv = Math.round(242 + (120-242)*prob);
      ctx.fillStyle = `rgba(${r},${g},${bv},0.18)`;
      ctx.fillRect(px, pad, step, H-2*pad);
    }
    if (model.w !== 0) {
      const bx = -model.b/model.w;
      const bcx = toX(bx);
      ctx.setLineDash([5,3]);
      ctx.strokeStyle = 'rgba(180,100,0,0.85)';
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(bcx,pad); ctx.lineTo(bcx,H-pad); ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = 'rgba(180,100,0,0.85)';
      ctx.font = '11px sans-serif';
      ctx.fillText('결정 경계', bcx+4, pad+14);
    }
  }

  if (preset === 'nonlinear') {
    const cx = toX(0), cy = toY(0);
    const r1 = toX(2.0) - toX(0);
    ctx.setLineDash([5,3]);
    ctx.strokeStyle = 'rgba(180,100,0,0.85)';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(cx,cy,r1,0,Math.PI*2); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = 'rgba(180,100,0,0.75)';
    ctx.font = '11px sans-serif';
    ctx.fillText('실제 경계 (비선형)', cx+r1+4, cy-6);
  }

  ctx.strokeStyle = 'rgba(0,0,0,0.1)'; ctx.lineWidth = 1;
  const zeroCY = toY(0);
  if (zeroCY > pad && zeroCY < H-pad) {
    ctx.beginPath(); ctx.moveTo(pad,zeroCY); ctx.lineTo(W-pad,zeroCY); ctx.stroke();
  }

  for (const p of pts) {
    const cx = toX(p.x), cy = toY(p.y);
    ctx.beginPath(); ctx.arc(cx, cy, 4.5, 0, Math.PI*2);
    if (p.cls === 0) {
      ctx.fillStyle = 'rgba(24,95,165,0.7)'; ctx.strokeStyle = 'rgba(24,95,165,1)';
    } else {
      ctx.fillStyle = 'rgba(163,45,45,0.7)'; ctx.strokeStyle = 'rgba(163,45,45,1)';
    }
    ctx.lineWidth = 1; ctx.fill(); ctx.stroke();
  }

  ctx.font = '12px sans-serif';
  ctx.fillStyle = '#185FA5';
  ctx.beginPath(); ctx.arc(pad+8, H-10, 4, 0, Math.PI*2); ctx.fill();
  ctx.fillText('클래스 0', pad+16, H-6);
  ctx.fillStyle = '#A32D2D';
  ctx.beginPath(); ctx.arc(pad+80, H-10, 4, 0, Math.PI*2); ctx.fill();
  ctx.fillText('클래스 1', pad+88, H-6);
}

function drawSigmoid(canvas, model) {
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.parentElement.clientWidth - 28;
  const H = Math.round(W * 0.85);
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const pad = 36;
  const xMin = -6, xMax = 6;
  const toX = v => pad + (v-xMin)/(xMax-xMin)*(W-2*pad);
  const toY = v => pad + (1-v)*(H-2*pad);

  ctx.strokeStyle = 'rgba(0,0,0,0.06)'; ctx.lineWidth = 0.5;
  [0.25,0.5,0.75].forEach(p => {
    const gy = toY(p);
    ctx.beginPath(); ctx.moveTo(pad,gy); ctx.lineTo(W-pad,gy); ctx.stroke();
  });
  [-4,-2,0,2,4].forEach(x => {
    const gx = toX(x);
    ctx.beginPath(); ctx.moveTo(gx,pad); ctx.lineTo(gx,H-pad); ctx.stroke();
  });

  ctx.strokeStyle = 'rgba(0,0,0,0.12)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(pad,toY(0)); ctx.lineTo(W-pad,toY(0)); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(toX(0),pad); ctx.lineTo(toX(0),H-pad); ctx.stroke();

  ctx.fillStyle = '#888780'; ctx.font = '11px sans-serif'; ctx.textAlign = 'center';
  [-4,-2,0,2,4].forEach(x => ctx.fillText(x, toX(x), H-pad+14));
  ctx.textAlign = 'left';
  [0,0.25,0.5,0.75,1.0].forEach(p => ctx.fillText(p.toFixed(2), pad+4, toY(p)-5));
  ctx.textAlign = 'center';
  ctx.fillText('z = w·x + b', (pad+W-pad)/2, H-4);
  ctx.save(); ctx.translate(12,(pad+H-pad)/2); ctx.rotate(-Math.PI/2);
  ctx.fillText('확률 P(y=1)', 0, 0); ctx.restore();

  const steps = 200;
  ctx.beginPath();
  for (let i=0;i<=steps;i++) {
    const x = xMin + (xMax-xMin)*i/steps;
    const z = model ? model.w*x + model.b : x;
    const y = sigmoid(z);
    if (i===0) ctx.moveTo(toX(x),toY(y));
    else ctx.lineTo(toX(x),toY(y));
  }
  ctx.lineTo(toX(xMax),toY(0)); ctx.closePath();
  ctx.fillStyle = 'rgba(24,95,165,0.08)'; ctx.fill();

  ctx.beginPath();
  for (let i=0;i<=steps;i++) {
    const x = xMin + (xMax-xMin)*i/steps;
    const z = model ? model.w*x + model.b : x;
    const y = sigmoid(z);
    if (i===0) ctx.moveTo(toX(x),toY(y));
    else ctx.lineTo(toX(x),toY(y));
  }
  ctx.strokeStyle = '#185FA5'; ctx.lineWidth = 2.5; ctx.setLineDash([]); ctx.stroke();

  ctx.setLineDash([4,3]);
  ctx.strokeStyle = 'rgba(180,100,0,0.6)'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(pad,toY(0.5)); ctx.lineTo(W-pad,toY(0.5)); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = 'rgba(180,100,0,0.8)';
  ctx.font = '11px sans-serif'; ctx.textAlign = 'right';
  ctx.fillText('threshold = 0.5', W-pad-4, toY(0.5)-5);

  if (model) {
    const label = Math.abs(model.w) > 2 ? '가파름 → 명확한 분류' :
                  Math.abs(model.w) > 0.8 ? '보통 경사' : '완만함 → 불확실한 분류';
    ctx.fillStyle = '#888780'; ctx.font = '11px sans-serif'; ctx.textAlign = 'right';
    ctx.fillText(`w ≈ ${model.w.toFixed(2)} (${label})`, W-pad, pad+12);
  }
  ctx.textAlign = 'left';
}

function update() {
  const pts = generateData(currentPreset, sepVal, noiseVal);
  const model = fitLogistic(pts);
  drawScatter(document.getElementById('scatter'), pts, model, currentPreset);
  drawSigmoid(document.getElementById('sigmoid'), model);
  document.getElementById('insight-text').innerHTML =
    `<strong>현재 상태:</strong> ${currentPreset ? presets[currentPreset].label : '슬라이더를 조절해 데이터 분포를 바꿔볼 것.'}`;
}

document.getElementById('sep-slider').addEventListener('input', e => {
  sepVal = parseFloat(e.target.value);
  document.getElementById('sep-val').textContent = sepVal.toFixed(1);
  currentPreset = null;
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  update();
});
document.getElementById('noise-slider').addEventListener('input', e => {
  noiseVal = parseFloat(e.target.value);
  document.getElementById('noise-val').textContent = noiseVal.toFixed(1);
  currentPreset = null;
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  update();
});
document.getElementById('presets').addEventListener('click', e => {
  const btn = e.target.closest('.preset-btn');
  if (!btn) return;
  currentPreset = btn.dataset.preset;
  const p = presets[currentPreset];
  sepVal = p.sep; noiseVal = p.noise;
  document.getElementById('sep-slider').value = sepVal;
  document.getElementById('noise-slider').value = noiseVal;
  document.getElementById('sep-val').textContent = sepVal.toFixed(1);
  document.getElementById('noise-val').textContent = noiseVal.toFixed(1);
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  update();
});

update();
window.addEventListener('resize', update);
</script>
</body>
</html>
